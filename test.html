<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaris Lab Komputer</title>
    <link rel="stylesheet" href="test.css">
</head>
<body>
    <!-- NAVBAR -->
    <header class="navbar">
        <div class="nav-left">
            <img src="logo uniska.png" alt="Icon Inventory" class="nav-icon">
            <div class="nav-text">
                <h1>Inventaris Lab Komputer</h1>
                <p>Sistem Manajemen Aset Lab Komputer Kampus</p>
            </div>
        </div>
        <button class="btn-add">+ Tambah Perangkat</button>
    </header>

    <main class="main-container">

        <!-- STATISTIC CARDS -->
        <section class="stats">
            <div class="stat-card blue">
                <div class="stat-head">
                    <p>Total Perangkat</p>
                    <img src="total.png" alt="icon total">
                </div>
                <h2>5</h2>
                <p class="stat-desc">Semua jenis perangkat</p>
            </div>
            <div class="stat-card green">
                <div class="stat-head">
                    <p>Perangkat Aktif</p>
                    <img src="aktif.png" alt="icon aktif">
                </div>
                <h2>3</h2>
                <p class="stat-desc">Siap digunakan</p>
            </div>
            <div class="stat-card red">
                <div class="stat-head">
                    <p>Perangkat Rusak</p>
                    <img src="rusak.png" alt="icon rusak">
                </div>
                <h2>1</h2>
                <p class="stat-desc">Perlu perbaikan</p>
            </div>
            <div class="stat-card orange">
                <div class="stat-head">
                    <p>Maintenance</p>
                    <img src="maintenance.png" alt="icon maintenance">
                </div>
                <h2>1</h2>
                <p class="stat-desc">Sedang dipelihara</p>
            </div>
        </section>

        <!-- SEARCH & FILTER -->
        <section class="controls">
            <input type="text" id="searchInput" placeholder="Cari kode aset, merk, model, serial...">
            <select id="labFilter">
                <option value="all">Semua Lab</option>
            </select>
        </section>

        <!-- TABLE DATA -->
        <section class="table-section">
            <table id="assetTable">
                <thead>
                    <tr>
                        <th>Kode Aset</th>
                        <th>Tipe</th>
                        <th>Merk & Model</th>
                        <th>Spesifikasi</th>
                        <th>Status</th>
                        <th>Garansi</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

    </main>

    <script src="test.js"></script>
</body>
</html>
