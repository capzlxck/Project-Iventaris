<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Inventory Lab Komputer</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

       body {
    margin: 0;
    height: 100vh;
    background-image: url('rektorat.jpg');
    background-size: cover;       /* gambar menutupi layar */
    background-repeat: no-repeat; /* tidak diulang */
    background-position: center;  /* posisi tengah */
    display: flex;
    justify-content: center;
    align-items: center;
    }

        .login-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .login-card {
            width: 400px;
            background: #ffffff;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        /* HEADER */
        .login-header {
            background: #6d3a77;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logoheader {
            width: 60px;
            height: auto;
        }

        .header-text {
            display: flex;
            flex-direction: column;
        }

        .login-header h2 {
            margin: 0;
            font-size: 16px;
            font-weight: bold;
        }

        .login-header p {
            margin: 2px 0 0;
            font-size: 12px;
        }

        /* INFO */
        .login-info {
            background: #e9f7f7;
            padding: 15px;
            font-size: 12px;
            color: #2c7a7b;
        }

        /* FORM */
        .login-form {
            padding: 20px;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 35px 10px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .input-group .icon {
            position: absolute;
            right: 10px;
            top: 50%;
            width: 20px;
            transform: translateY(-50%);
            color: #999;
        }

        /* BUTTON */
        .button-area {
            text-align: right;
        }

        .btn-login {
            background: #6d3a77;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
        }

        button:hover {
            background: #5b2f63;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <div class="login-header">
            <img src="logo uniska.png" class="logoheader" alt="logo">

            <div class="header-text">
                <h2>Inventaris Lab Komputer</h2>
                <p>Universitas Uniska</p>
            </div>
        </div>

        <div class="login-info">
            <p><strong>Selamat datang di halaman login sistem.</strong></p>
            <p>Silahkan Login, untuk masuk ke dalam inventaris labkom.</p>
        </div>

        <form class="login-form">
            <div class="input-group">
                <input type="text" placeholder="Username">
                <img class="icon" src="user.png">
            </div>

            <div class="input-group">
                <input type="password" placeholder="Password">
                <img class="icon" src="padlock.png">
            </div>

            <div class="button-area">
                <a href="log.php" class="btn-login">Masuk</a>
            </div>
        </form>

    </div>
</div>

</body>
</html>
